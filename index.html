<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>Character Counter </h1>
            <textarea class="input" placeholder="enter the text"></textarea>
            <div class="btn">
                <button class="submit">submit</button>
            </div>
            <div class="output">
                <p class="countWord">CountWord : 0</p>
                <p class="countCharacter">CountCharacter : 0</p>
                <p class="warning">Warning : first enter the text</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
